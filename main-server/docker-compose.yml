name: subio-main
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql:ro
      - ./migrations/002_v21_extensions.sql:/docker-entrypoint-initdb.d/002_v21_extensions.sql:ro
      - ./migrations/003_scanner_settings.sql:/docker-entrypoint-initdb.d/003_scanner_settings.sql:ro
      - ./migrations/004_nullable_report_config.sql:/docker-entrypoint-initdb.d/004_nullable_report_config.sql:ro
      - ./migrations/005_premium_bot.sql:/docker-entrypoint-initdb.d/005_premium_bot.sql:ro
      - ./migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes: [redis-data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    ports: ["127.0.0.1:8000:8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bot:
    build: .
    command: ["python", "-m", "app.bot"]
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    restart: unless-stopped

  worker:
    build: .
    command: ["arq", "app.worker.WorkerSettings"]
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    restart: unless-stopped

  monitor:
    build: .
    command: ["python", "-m", "app.monitor"]
    env_file: .env
    profiles: ["monitoring"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
